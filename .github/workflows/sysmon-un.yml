name: sysmon-un CI

on:
  push:
    branches: [main]
    paths:
      - 'sysmon-un/**'
      - '.github/workflows/sysmon-un.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sysmon-un/**'
      - '.github/workflows/sysmon-un.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release -p sysmon-un
        working-directory: sysmon-un

      - name: Run tests
        run: cargo test -p sysmon-un
        working-directory: sysmon-un

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux
        run: cargo build --release -p sysmon-un
        working-directory: sysmon-un

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: SysMon UN v${{ github.ref_name }}
          files: |
            sysmon-un/target/release/sysmon-un
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
