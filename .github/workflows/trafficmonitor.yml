name: TrafficMonitor CI

on:
  push:
    branches: [main]
    paths:
      - 'TrafficMonitor/**'
      - '.github/workflows/trafficmonitor.yml'
  pull_request:
    branches: [main]
    paths:
      - 'TrafficMonitor/**'
      - '.github/workflows/trafficmonitor.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2
        with:
          vsversion: latest

      - name: Build
        shell: cmd
        run: |
          cd TrafficMonitor/TrafficMonitor
          msbuild TrafficMonitor.vcxproj /p:Configuration=Release /p:Platform=x64 /p:OutDir=x64\Release\ /p:WindowsTargetPlatformVersion=10.0

      - name: List output
        shell: cmd
        run: |
          dir TrafficMonitor\TrafficMonitor\x64\Release\*.exe 2>nul || echo "No exe found"

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: TrafficMonitor-x64
          path: TrafficMonitor/TrafficMonitor/x64/Release/*.exe
          retention-days: 7
          if-no-files-found: error

  release:
    needs: build
    runs-on: windows-2022
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2
        with:
          vsversion: latest

      - name: Build Release
        shell: cmd
        run: |
          cd TrafficMonitor/TrafficMonitor
          msbuild TrafficMonitor.vcxproj /p:Configuration=Release /p:Platform=x64 /p:OutDir=x64\Release\ /p:WindowsTargetPlatformVersion=10.0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: TrafficMonitor v${{ steps.version.outputs.VERSION }}
          files: |
            TrafficMonitor/TrafficMonitor/x64/Release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
