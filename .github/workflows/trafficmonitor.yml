name: TrafficMonitor CI

on:
  push:
    branches: [main]
    paths:
      - 'TrafficMonitor/**'
      - '.github/workflows/trafficmonitor.yml'
  pull_request:
    branches: [main]
    paths:
      - 'TrafficMonitor/**'
      - '.github/workflows/trafficmonitor.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MFC
        shell: powershell
        run: |
          $installerPath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer"
          $installPath = & "$installerPath\vswhere.exe" -latest -property installationPath
          $setupExe = "$installerPath\setup.exe"
          Write-Output "Install path: $installPath"
          Write-Output "Setup exe: $setupExe"
          if (Test-Path $setupExe) {
            Start-Process -FilePath $setupExe -ArgumentList "modify","--installPath",$installPath,"--add","Microsoft.VisualStudio.Component.VC.ATLMFC","--quiet","--wait","--norestart" -Wait -NoNewWindow
          } else {
            Write-Output "setup.exe not found, trying download"
            $dlPath = "$env:TEMP\vs_installer.exe"
            Invoke-WebRequest "https://aka.ms/vs/17/release/vs_Enterprise.exe" -OutFile $dlPath
            Start-Process -FilePath $dlPath -ArgumentList "modify","--installPath",$installPath,"--add","Microsoft.VisualStudio.Component.VC.ATLMFC","--quiet","--wait","--norestart" -Wait -NoNewWindow
          }

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2
        with:
          vsversion: latest

      - name: Build
        shell: cmd
        run: |
          cd TrafficMonitor
          msbuild TrafficMonitor.sln /p:Configuration=Release /p:Platform=x64 /p:WindowsTargetPlatformVersion=10.0

      - name: List output
        if: always()
        shell: cmd
        run: |
          echo === Bin directory ===
          dir /s /b TrafficMonitor\Bin\ 2>nul || echo Bin dir not found
          echo.
          echo === All .exe ===
          dir /s /b TrafficMonitor\*.exe 2>nul || echo No .exe found

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: TrafficMonitor-x64
          path: |
            TrafficMonitor/Bin/x64/Release/*.exe
          retention-days: 7
          if-no-files-found: warn

  release:
    needs: build
    runs-on: windows-2022
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MFC
        shell: powershell
        run: |
          $installerPath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer"
          $installPath = & "$installerPath\vswhere.exe" -latest -property installationPath
          Start-Process -FilePath "$installerPath\setup.exe" -ArgumentList "modify","--installPath",$installPath,"--add","Microsoft.VisualStudio.Component.VC.ATLMFC","--quiet","--wait","--norestart" -Wait -NoNewWindow

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2
        with:
          vsversion: latest

      - name: Build Release
        shell: cmd
        run: |
          cd TrafficMonitor
          msbuild TrafficMonitor.sln /p:Configuration=Release /p:Platform=x64 /p:WindowsTargetPlatformVersion=10.0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: TrafficMonitor v${{ steps.version.outputs.VERSION }}
          files: |
            TrafficMonitor/Bin/x64/Release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
