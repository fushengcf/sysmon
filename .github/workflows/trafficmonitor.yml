name: TrafficMonitor CI

on:
  push:
    branches: [main]
    paths:
      - 'TrafficMonitor/**'
      - '.github/workflows/trafficmonitor.yml'
  pull_request:
    branches: [main]
    paths:
      - 'TrafficMonitor/**'
      - '.github/workflows/trafficmonitor.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2
        with:
          vsversion: latest

      - name: Build
        shell: cmd
        run: |
          cd TrafficMonitor
          msbuild TrafficMonitor.sln /p:Configuration=Release /p:Platform=x64 /p:OutDir=%cd%\Bin\ /p:WindowsTargetPlatformVersion=10.0 /v:minimal > build_output.txt 2>&1
          type build_output.txt

      - name: Upload build output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TrafficMonitor-build-output
          path: TrafficMonitor/build_output.txt
          retention-days: 7

      - name: Find output exe
        shell: cmd
        run: |
          echo Searching for .exe files in TrafficMonitor\Bin\
          dir /s /b TrafficMonitor\Bin\*.exe
          echo.
          for /r TrafficMonitor\Bin %%f in (*.exe) do (
            echo Found: %%f
          )

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: TrafficMonitor-x64
          path: |
            TrafficMonitor/Bin/**/*.exe
          retention-days: 7
          if-no-files-found: warn

  release:
    needs: build
    runs-on: windows-2022
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2
        with:
          vsversion: latest

      - name: Build Release
        shell: cmd
        run: |
          cd TrafficMonitor
          msbuild TrafficMonitor.sln /p:Configuration=Release /p:Platform=x64 /p:OutDir=%cd%\Bin\ /p:WindowsTargetPlatformVersion=10.0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: TrafficMonitor v${{ steps.version.outputs.VERSION }}
          files: |
            TrafficMonitor/Bin/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
